{% extends "base.html" %}

{% block title %}Edit expense — Spendly{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/edit_expense.css') }}">
{% endblock %}

{% block content %}
<section class="edit-expense-section">
  <div class="edit-expense-container">
    <div class="edit-expense-header">
      <h1 class="edit-expense-title">Edit expense</h1>
      <p class="edit-expense-subtitle">Update this transaction in your tracker.</p>
    </div>

    <form class="edit-expense-card" method="post" action="{{ url_for('edit_expense', id=expense_id) }}" novalidate>
      {% if error %}
        <div class="edit-expense-error" role="alert">{{ error }}</div>
      {% endif %}

      <div class="form-group">
        <label for="amount">Amount</label>
        <input class="form-input" type="number" id="amount" name="amount"
               step="0.01" min="0.01" max="1000000"
               value="{{ form.amount }}" required
               placeholder="0.00" autocomplete="off">
      </div>

      <div class="form-group">
        <label for="category">Category</label>
        <select class="form-input" id="category" name="category" required>
          <option value="" disabled selected hidden>Select a category</option>
          {% for cat in categories %}
            <option value="{{ cat }}" {% if form.category == cat %}selected{% endif %}>{{ cat }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label for="date">Date</label>
        <input class="form-input" type="date" id="date" name="date"
               value="{{ form.date }}" max="{{ today }}" required>
      </div>

      <div class="form-group">
        <label for="description">Description <span class="edit-expense-optional">(optional)</span></label>
        <input class="form-input" type="text" id="description" name="description"
               value="{{ form.description }}" maxlength="200"
               placeholder="What was this for?">
      </div>

      <button type="submit" class="btn-submit">Save changes</button>
    </form>

    <a class="edit-expense-back" href="{{ url_for('profile') }}">&larr; Back to dashboard</a>
  </div>
</section>
{% endblock %}
